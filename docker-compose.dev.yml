version: '3.8'

services:
  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: bead-helper-db
    environment:
      POSTGRES_USER: bead
      POSTGRES_PASSWORD: password
      POSTGRES_DB: beadhelper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bead"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: bead-helper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端API (开发环境)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bead-helper-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv  # 不挂载虚拟环境
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://bead:password@db:5432/beadhelper
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # 前端应用 (开发环境)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bead-helper-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # 不挂载node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
